<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Consulta - PetCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (Seus estilos CSS permanecem os mesmos) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f9f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header i {
            font-size: 28px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .form-container {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2e7d32;
            font-weight: 600;
            font-size: 16px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #2e7d32;
        }

        .input-with-icon input,
        .input-with-icon select,
        .input-with-icon textarea {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-with-icon input:focus,
        .input-with-icon select:focus,
        .input-with-icon textarea:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
            outline: none;
        }

        .input-with-icon textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        .submit-button:hover {
            background-color: #4caf50;
        }

        .info-box {
            background-color: #e8f5e9;
            border-left: 4px solid #2e7d32;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }

        .info-box p {
            color: #2e7d32;
            font-size: 14px;
            margin: 0;
        }

        .pet-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #4caf50;
        }

        .pet-card h3 {
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .pet-card p {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                margin: 10px;
            }

            .form-container {
                padding: 20px;
            }
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <i class="fas fa-calendar-check"></i>
        <h1>Agendar Consulta</h1>
    </div>

    <div class="form-container">
        <div class="info-box">
            <p><i class="fas fa-info-circle"></i> Agende uma consulta para seu pet. Preencha todos os campos abaixo.</p>
        </div>

        <form th:action="@{/consultas/agendar}" method="post" id="appointmentForm">
            <div class="form-group">
                <label for="petId">Selecione seu Pet:</label>
                <div class="input-with-icon">
                    <i class="fas fa-paw"></i>
                    <select name="petId" id="petId" required>
                        <option value="">-- Selecione seu pet --</option>
                        <option th:each="pet : ${pets}"
                                th:value="${pet.id}"
                                th:text="${pet.nome} + ' (' + ${pet.especie} + ')'"></option>
                    </select>
                </div>

                <div id="petsList" style="margin-top: 15px;">
                    <div class="pet-card" th:each="pet : ${pets}">
                        <h3 th:text="${pet.nome}"></h3>
                        <p th:text="${pet.especie} + ' - ' + ${pet.raca}"></p>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="dataHora">Data e Hora da Consulta:</label>
                <div class="input-with-icon">
                    <i class="fas fa-clock"></i>
                    <input type="datetime-local" name="dataHora" id="dataHora" required>
                </div>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição/Motivo da Consulta:</label>
                <div class="input-with-icon">
                    <i class="fas fa-stethoscope"></i>
                    <textarea name="descricao" id="descricao" required placeholder="Descreva o motivo da consulta, sintomas observados ou qualquer informação relevante sobre a saúde do seu pet..."></textarea>
                </div>
            </div>

            <button type="submit" class="submit-button">
                <i class="fas fa-calendar-plus"></i> Agendar Consulta
            </button>
        </form>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> Consulta agendada com sucesso!
        </div>
    </div>
</div>

<script>


    // Preencher a data/hora com um valor padrão (próxima segunda-feira às 9:00)
    window.addEventListener('DOMContentLoaded', (event) => {
        const now = new Date();
        // Lógica para definir a próxima segunda-feira às 9h
        let nextMonday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + (1 + 7 - now.getDay()) % 7, 9, 0, 0);
        if (nextMonday < now) { // Se a próxima segunda já passou nesta semana
             nextMonday.setDate(nextMonday.getDate() + 7);
        }

        // Formatar para o input datetime-local (YYYY-MM-DDTHH:MM)
        const year = nextMonday.getFullYear();
        const month = String(nextMonday.getMonth() + 1).padStart(2, '0');
        const day = String(nextMonday.getDate()).padStart(2, '0');
        const hours = String(nextMonday.getHours()).padStart(2, '0');
        const minutes = String(nextMonday.getMinutes()).padStart(2, '0');

        const defaultDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        document.getElementById('dataHora').value = defaultDateTime;
    });
</script>
</body>
</html>
