<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Meus Dados</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .info-section, .password-section {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
    }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
    button {
        background: #3498db;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .info-display p { margin: 5px 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>Meus Dados</h1>

  <div class="info-section">
    <h2>Informações Pessoais</h2>
    <div class="info-display">
      <p><strong>Nome:</strong> <span th:text="${usuario.nome}"></span></p>
      <p><strong>Email:</strong> <span th:text="${usuario.email}"></span></p>
      <p><strong>Telefone:</strong> <span th:text="${usuario.telefone} ?: 'Não informado'"></span></p>
      <p><strong>Endereço:</strong> <span th:text="${usuario.endereco} ?: 'Não informado'"></span></p>
    </div>
    <button onclick="document.getElementById('editForm').style.display='block'">
      Editar Dados
    </button>

    <div id="editForm" style="display: none; margin-top: 20px;">
      <h3>Editar Informações</h3>
      <form th:action="@{/usuario/atualizar}" method="post">
        <input type="hidden" name="email" th:value="${usuario.email}">

        <div class="form-group">
          <label>Nome:</label>
          <input type="text" name="nome" th:value="${usuario.nome}">
        </div>

        <div class="form-group">
          <label>Telefone:</label>
          <input type="text" name="telefone" th:value="${usuario.telefone}">
        </div>

        <div class="form-group">
          <label>Endereço:</label>
          <input type="text" name="endereco" th:value="${usuario.endereco}">
        </div>

        <button type="submit">Salvar Alterações</button>
      </form>
    </div>
  </div>

  <div class="password-section">
    <h2>Alterar Senha</h2>
    <form th:action="@{/usuario/alterar-senha}" method="post">
      <input type="hidden" name="email" th:value="${usuario.email}">

      <div class="form-group">
        <label>Senha Atual:</label>
        <input type="password" name="senhaAtual" required>
      </div>

      <div class="form-group">
        <label>Nova Senha:</label>
        <input type="password" name="novaSenha" required>
      </div>

      <div class="form-group">
        <label>Confirmar Nova Senha:</label>
        <input type="password" name="confirmarSenha" required>
      </div>

      <button type="submit">Alterar Senha</button>
    </form>
  </div>
</div>
</body>
</html>
