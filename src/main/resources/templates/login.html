<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Petcare</title>
  <style>
    body {
        font-family: 'Arial', sans-serif;
        background: url('https://images.unsplash.com/photo-1586671267731-da2cf3ceeb80?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        position: relative;
    }

    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(46, 125, 50, 0.85);
        z-index: 0;
    }

    .login-container {
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        padding: 40px;
        width: 100%;
        max-width: 450px;
        z-index: 1;
        position: relative;
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .login-header img {
        height: 80px;
        margin-bottom: 15px;
    }

    h1 {
        color: #2e7d32;
        text-align: center;
        margin-bottom: 25px;
        font-size: 2rem;
    }

    .form-group {
        margin-bottom: 25px;
    }

    input {
        width: 100%;
        padding: 15px;
        border: 2px solid #c8e6c9;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
        transition: border 0.3s;
    }

    input:focus {
        border-color: #2e7d32;
        outline: none;
    }

    button {
        width: 100%;
        padding: 15px;
        background-color: #2e7d32;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: bold;
        transition: background-color 0.3s;
    }

    button:hover {
        background-color: #1b5e20;
    }

    .error-message {
        color: #e53935;
        text-align: center;
        margin-top: 15px;
        padding: 10px;
        background-color: #ffebee;
        border-radius: 5px;
        border-left: 4px solid #e53935;
    }

    .register-link {
        text-align: center;
        margin-top: 25px;
        color: #666;
    }

    .register-link a {
        color: #2e7d32;
        text-decoration: none;
        font-weight: bold;
    }

    .register-link a:hover {
        text-decoration: underline;
    }

    .input-icon {
        position: relative;
    }

    .input-icon i {
        position: absolute;
        left: 15px;
        top: 15px;
        color: #81c784;
    }

    .input-icon input {
        padding-left: 45px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="PetCare Logo">
    <h1>Bem-vindo ao PetCare</h1>
  </div>

  <div th:if="${erro}" class="error-message" th:text="${erro}"></div>

  <form th:action="@{/login}" method="post">
    <div class="form-group input-icon">
      <i class="fas fa-envelope"></i>
      <input type="email" name="email" placeholder="Email" required>
    </div>

    <div class="form-group input-icon">
      <i class="fas fa-lock"></i>
      <input type="password" name="senha" placeholder="Senha" required>
    </div>

    <button type="submit">Entrar</button>
  </form>

  <div class="register-link">
    Não tem uma conta? <a href="/registro">Cadastre-se</a>
  </div>
</div>
</body>
</html>
