<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f9f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 850px;
            height: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23227d32" fill-opacity="0.2" d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,197.3C1248,203,1344,149,1392,122.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            opacity: 0.3;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .logo i {
            margin-right: 10px;
            font-size: 32px;
        }

        .welcome-text h1 {
            font-size: 32px;
            margin-bottom: 15px;
            z-index: 1;
            position: relative;
        }

        .welcome-text p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            z-index: 1;
            position: relative;
        }

        .pet-icons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            z-index: 1;
            position: relative;
        }

        .pet-icons i {
            font-size: 40px;
            opacity: 0.8;
        }

        .right-panel {
            flex: 1;
            background-color: white;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #2e7d32;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #2e7d32;
        }

        .input-with-icon input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-with-icon input:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
            outline: none;
        }

        .login-button {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 20px;
            width: 100%;
        }

        .login-button:hover {
            background-color: #4caf50;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            background-color: #ffeaea;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ffcdd2;
            margin-bottom: 15px;
        }

        /* MUDANÇA: Adicionado estilo para mensagem de sucesso */
        .success-message {
            color: #2e7d32;
            text-align: center;
            margin-top: 15px;
            background-color: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #a5d6a7;
            margin-bottom: 15px;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .register-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: #4caf50;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                width: 100%;
            }

            .left-panel {
                padding: 30px 20px;
            }

            .right-panel {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="logo">
            <i class="fas fa-paw"></i> PetCare
        </div>
        <div class="welcome-text">
            <h1>Bem-vindo de volta!</h1>
            <p>Entre na sua conta para acessar todos os serviços e cuidados que seu pet merece. Oferecemos o melhor para o bem-estar do seu animal de estimação.</p>
        </div>
        <div class="pet-icons">
            <i class="fas fa-dog"></i>
            <i class="fas fa-cat"></i>
            <i class="fas fa-heart"></i>
        </div>
    </div>

    <div class="right-panel">
        <div class="login-header">
            <h2>Fazer Login</h2>
            <p>Entre com suas credenciais para acessar sua conta</p>
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>

        <div th:if="${success}" class="success-message" th:text="${success}"></div>
        <div th:if="${logout}" class="success-message" th:text="${logout}"></div>


        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" name="password" placeholder="Sua senha" required>
                </div>
            </div>

            <button type="submit" class="login-button">Entrar</button>

            <div class="register-link">
                Não tem uma conta? <a th:href="@{/registro}">Cadastre-se</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
