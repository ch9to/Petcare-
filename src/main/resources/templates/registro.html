<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Simplificado</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 15px;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Cadastro de Usuário</h1>

    <form th:action="@{/registro/salvar}" method="post" th:object="${usuario}">
        <input type="text" th:field="*{nome}" placeholder="Nome completo" required>
        <input type="email" th:field="*{email}" placeholder="Email" required>
        <input type="password" th:field="*{senha}" placeholder="Senha" required>
        <input type="tel" th:field="*{telefone}" placeholder="Telefone">
        <input type="text" th:field="*{endereco}" placeholder="Endereço">

        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem conta? <a th:href="@{/login}">Faça login</a></p>
</div>
</body>
</html>
